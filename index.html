  content += '</div>';

  showModal('新增保险库记录 (Add Vault Record)', content);

  // Init type selection
  setTimeout(function() {
    var firstTag = document.querySelector('#vault-type-select .tag');
    if (firstTag) firstTag.classList.add('selected');
  }, 100);
}

var vaultFieldCount = 1;
function addVaultField() {
  var container = document.getElementById('vault-fields');
  var div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;';
  div.innerHTML = '<input class="input" placeholder="字段名 (Label)" style="flex:1;" id="vf-label-' + vaultFieldCount + '"><input class="input" placeholder="值 (Value)" style="flex:1;" id="vf-value-' + vaultFieldCount + '">';
  container.appendChild(div);
  vaultFieldCount++;
}

function saveVaultRecord() {
  var title = document.getElementById('new-vault-title').value.trim();
  if (!title) { showToast('请输入标题 (Enter a title)'); return; }

  var type = document.getElementById('new-vault-type').value;
  var fields = [];
  for (var i = 0; i < vaultFieldCount; i++) {
    var labelEl = document.getElementById('vf-label-' + i);
    var valueEl = document.getElementById('vf-value-' + i);
    if (labelEl && valueEl) {
      var label = labelEl.value.trim();
      var value = valueEl.value.trim();
      if (label || value) fields.push({ label: label, value: value });
    }
  }

  var record = {
    id: uid(),
    type: type,
    title: title,
    fields: fields,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };

  Vault.add(record).then(function() {
    document.querySelector('.modal-overlay').remove();
    showToast('✅ 已加密保存 (Encrypted & Saved)');
    showVaultList();
    vaultFieldCount = 1;
  }).catch(function(err) {
    showToast('❌ 保存失败 (Failed): ' + err.message);
  });
}

function viewVaultItem(id) {
  Vault.getDecrypted(id).then(function(record) {
    if (!record) { showToast('记录不存在'); return; }

    var vt = vaultTypeById(record.type);
    var content = '<div style="display:flex;flex-direction:column;gap:8px;">';
    content += '<div style="text-align:center;font-size:32px;margin-bottom:8px;">' + (vt ? vt.icon : '📌') + '</div>';
    content += '<div style="text-align:center;font-size:15px;color:var(--text);">' + escHtml(record.title) + '</div>';
    content += '<div style="text-align:center;font-size:10px;color:var(--text-muted);margin-bottom:8px;">' + (vt ? vt.zh + ' (' + vt.en + ')' : '') + '</div>';
    record.fields.forEach(function(f) {
      content += '<div class="vault-detail-field"><span class="field-label">' + escHtml(f.label || '—') + '</span><span class="field-value">' + escHtml(f.value || '—') + '</span></div>';
    });
    content += '<div style="display:flex;gap:8px;margin-top:12px;">';
    content += '<button class="btn btn-small btn-secondary" onclick="App.deleteVaultRecord(\'' + id + '\')">🗑️ 删除 (Delete)</button>';
    content += '</div>';
    content += '</div>';

    showModal('保险库详情 (Vault Detail)', content);
  });
}

function deleteVaultRecord(id) {
  if (!confirm('确定删除？此操作不可恢复。(Delete? This cannot be undone.)')) return;
  Vault.remove(id).then(function() {
    document.querySelector('.modal-overlay').remove();
    showToast('🗑️ 已删除 (Deleted)');
    showVaultList();
  });
}

function resetVault() {
  if (!confirm('⚠️ 重置保险库将清除所有 PIN 和加密数据。确定？\n(Reset will clear all PIN and encrypted data. Confirm?)')) return;
  localStorage.removeItem('ledger_settings');
  localStorage.removeItem('ledger_vault_mirror');
  DB.getAllVaultRecords().then(function(records) {
    return Promise.all(records.map(function(r) { return DB.deleteVaultRecord(r.id); }));
  }).then(function() {
    Vault.lock();
    vaultState.mode = 'setup';
    renderVaultSetup();
    showToast('🔄 保险库已重置 (Vault Reset)');
  });
}

function exportVault() {
  Promise.all([DB.getAllVaultRecords()]).then(function(results) {
    var data = {
      version: 2,
      kind: 'encrypted-vault-backup',
      exportedAt: new Date().toISOString(),
      settings: Settings.get(),
      vault: results[0]
    };
    var json = JSON.stringify(data, null, 2);
    downloadFile('ledger-encrypted-vault-backup-' + todayStr() + '.json', json);
    Settings.updateBackupDate();
    showToast('📤 加密保险库已导出 (Encrypted Vault Exported)');
  });
}

/* ================================================================
   Backup / Export / Import
   ================================================================ */
function showBackupModal() {
  var currentRate = (Settings.get() && Settings.get().exchangeRate) ? Settings.get().exchangeRate : 4.7;
  var content = '<div style="display:flex;flex-direction:column;gap:12px;">';
  content += '<div style="font-size:12px;color:var(--text-secondary);">💱 汇率设置 (Exchange Rate)</div>';
  content += '<div style="display:flex;gap:8px;align-items:center;">';
  content += '<span style="font-size:11px;color:var(--text);">1 AUD = </span>';
  content += '<input class="input" id="exchange-rate-input" type="number" step="0.01" value="' + currentRate + '" style="width:80px;text-align:center;">';
  content += '<span style="font-size:11px;color:var(--text);">CNY</span>';
  content += '<button class="btn btn-small btn-primary" onclick="App.saveExchangeRate()">💾 保存 (Save)</button>';
  content += '</div>';
  content += '<div style="font-size:9px;color:var(--text-muted);">用于仪表盘澳元人民币换算 (For AUD/CNY conversion on dashboard)</div>';
  content += '<hr style="border-color:var(--border-light);">';
  content += '<div style="font-size:12px;color:var(--text-secondary);">📤 导出数据 (Export Data)</div>';
  content += '<button class="btn btn-primary btn-block" onclick="App.exportAllData()">📤 导出全部数据 (Export All)</button>';
  content += '<div style="font-size:10px;color:var(--text-muted);">包含账目、凭证照片、PIN 派生参数、保险库加密数据</div>';
  content += '<div id="storage-stats" style="font-size:10px;color:var(--text-muted);text-align:center;"></div>';
  content += '<hr style="border-color:var(--border-light);">';
  content += '<div style="font-size:12px;color:var(--text-secondary);">📥 导入数据 (Import Data)</div>';
  content += '<input type="file" id="import-file" accept=".json" style="display:none;" onchange="App.importAllData(this)">';
  content += '<button class="btn btn-secondary btn-block" onclick="document.getElementById(\'import-file\').click()">📥 选择文件导入 (Choose File)</button>';
  content += '<div style="font-size:10px;color:var(--text-muted);">导入将覆盖现有数据，请先导出备份</div>';
  content += '<hr style="border-color:var(--border-light);">';
  content += '<div style="font-size:12px;color:var(--text-secondary);">🔐 仅导出保险库 (Vault Only)</div>';
  content += '<button class="btn btn-secondary btn-block" onclick="App.exportVaultFromBackup()">🔐 导出保险库 (Export Vault)</button>';
  content += '<div style="font-size:10px;color:var(--text-muted);">保险库备份保持加密，恢复后仍需原 PIN 解锁</div>';
  content += '</div>';

  showModal('备份与恢复 (Backup & Restore)', content);

  // Load storage stats async
  DB.getAllAttachments().then(function(atts) {
    var totalSize = atts.reduce(function(s,a){return s+(a.sizeBytes||0);},0);
    var el = document.getElementById('storage-stats');
    if (el) {
      var statusClass = totalSize > 50*1024*1024 ? 'color:#c49474;' : 'color:var(--text-muted);';
      el.innerHTML = '<span style="' + statusClass + '">📷 ' + atts.length + ' 张凭证 (Receipts) · 占用 (Storage): ' + formatBytes(totalSize) + '</span>';
    }
  });
}

function exportAllData() {
  Promise.all([DB.getAllExpenses(), DB.getAllVaultRecords(), DB.getAllAttachments()]).then(function(results) {
    // Convert attachment blobs to base64 for JSON export (each map returns a Promise)
    var attPromises = results[2].map(function(att) {
      return blobToBase64(att.blob).then(function(dataBase64) {
        return {
          id: att.id,
          expenseId: att.expenseId,
          fileName: att.fileName,
          dataBase64: dataBase64,
          width: att.width,
          height: att.height,
          sizeBytes: att.sizeBytes,
          createdAt: att.createdAt
        };
      });
    });
    return Promise.all(attPromises).then(function(attData) {
      var data = {
        version: 3,
        kind: 'full-encrypted-backup',
        exportedAt: new Date().toISOString(),
        settings: Settings.get(),
        expenses: results[0],
        vault: results[1],
        attachments: attData
      };
      var json = JSON.stringify(data, null, 2);
      downloadFile('ledger-full-backup-' + todayStr() + '.json', json);
      Settings.updateBackupDate();
      var totalAttSize = attData.reduce(function(s,a){return s+(a.sizeBytes||0);},0);
      showToast('📤 备份完成 (Backup Complete) · ' + attData.length + ' 凭证 (Receipts) · ' + formatBytes(totalAttSize));
      document.querySelector('.modal-overlay').remove();
    });
  });
}

function blobToBase64(blob) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.readAsDataURL(blob);
  });
}

function base64ToBlob(base64) {
  var parts = base64.split(',');
  var mime = parts[0].match(/:(.*?);/)[1];
  var bytes = atob(parts[1]);
  var arr = new Uint8Array(bytes.length);
  for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function importAllData(input) {
  var file = input.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.version || (!Array.isArray(data.expenses) && !Array.isArray(data.vault))) {
        showToast('❌ 无效的备份文件 (Invalid backup file)');
        return;
      }
    } catch(err) {
      showToast('❌ 文件格式错误 (Invalid file format)');
      return;
    }

    if (!confirm('⚠️ 导入将覆盖对应的本地数据。全量备份会覆盖账目和保险库；保险库备份只覆盖保险库。确定继续？\n(Import will overwrite matching local data. Continue?)')) return;

    var data = JSON.parse(e.target.result);
    var importsExpenses = Array.isArray(data.expenses);
    var importsVault = Array.isArray(data.vault);
    var importsAttachments = Array.isArray(data.attachments);
    Promise.all([
      // Clear existing data
      importsExpenses ? DB.getAllExpenses().then(function(all) {
        return Promise.all(all.map(function(e) { return DB.deleteExpense(e.id); }));
      }) : Promise.resolve(),
      importsVault ? DB.getAllVaultRecords().then(function(all) {
        return Promise.all(all.map(function(r) { return DB.deleteVaultRecord(r.id); }));
      }) : Promise.resolve(),
      importsAttachments ? DB.getAllAttachments().then(function(all) {
        return Promise.all(all.map(function(a) { return DB.deleteAttachment(a.id); }));
      }) : Promise.resolve()
    ]).then(function() {
      // Import expenses
      return Promise.all((data.expenses || []).map(function(e) {
        return DB.addExpense(e).catch(function(err) {
          return DB.updateExpense(e).catch(function() {});
        });
      }));
    }).then(function() {
      // Import vault
      return Promise.all((data.vault || []).map(function(r) {
        return DB.addVaultRecord(r).catch(function() {
          return DB.updateVaultRecord(r).catch(function() {});
        });
      }));
    }).then(function() {
      // Import attachments
      return Promise.all((data.attachments || []).map(function(att) {
        var blob = att.dataBase64 ? base64ToBlob(att.dataBase64) : att.blob;
        return DB.addAttachment({
          id: att.id,
          expenseId: att.expenseId,
          fileName: att.fileName,
          blob: blob,
          width: att.width,
          height: att.height,
          sizeBytes: att.sizeBytes,
          createdAt: att.createdAt
        }).catch(function() {});
      }));
    }).then(function() {
      if (data.settings) Settings.set(data.settings);
      Vault._updateMirror();
      document.querySelector('.modal-overlay').remove();
      showToast('✅ 数据恢复完成 (Restore Complete)');
      navigateTo('dashboard');
    }).catch(function(err) {
      showToast('❌ 导入失败 (Import Failed): ' + err.message);
    });
  };
  reader.readAsText(file);
}

function exportVaultFromBackup() {
  exportVault();
  document.querySelector('.modal-overlay').remove();
}

function downloadFile(filename, content) {
  var blob = new Blob([content], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ================================================================
   Month Navigation (Dashboard)
   ================================================================ */
function prevMonth() {
  var parts = dashMonth.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  if (m === 1) { y--; m = 12; } else { m--; }
  dashMonth = y + '-' + String(m).padStart(2,'0');
  renderDashboard();
}

function nextMonth() {
  var parts = dashMonth.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  if (m === 12) { y++; m = 1; } else { m++; }
  dashMonth = y + '-' + String(m).padStart(2,'0');
  renderDashboard();
}

/* ================================================================
   Helper
   ================================================================ */
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ================================================================
   App Initialization
   ================================================================ */
var App = {
  // Navigation
  onAmountInput: onAmountInput,
  selectCategory: selectCategory,
  selectPayment: selectPayment,
  toggleCurrency: toggleCurrency,
  saveExchangeRate: saveExchangeRate,
  onImagePicked: onImagePicked,
  removePendingImage: removePendingImage,
  viewFullscreenImage: viewFullscreenImage,
  viewAttachmentImage: viewAttachmentImage,
  attachToExpense: attachToExpense,
  recordExpense: recordExpense,
  showBackupModal: showBackupModal,
  exportAllData: exportAllData,
  importAllData: importAllData,
  exportVaultFromBackup: exportVaultFromBackup,

  // Transactions
  onTxnSearch: onTxnSearch,
  onTxnFilter: onTxnFilter,
  txnPrevMonth: txnPrevMonth,
  txnNextMonth: txnNextMonth,
  editExpense: editExpense,
  deleteExpense: deleteExpense,

  // Vault
  pinKey: pinKey,
  resetVault: resetVault,
  showAddVaultModal: showAddVaultModal,
  addVaultField: addVaultField,
  saveVaultRecord: saveVaultRecord,
  viewVaultItem: viewVaultItem,
  deleteVaultRecord: deleteVaultRecord,
  exportVault: exportVault,

  // Dashboard
  prevMonth: prevMonth,
  nextMonth: nextMonth,

  // Export
  showExportModal: function() { showBackupModal(); }
};

// Initialize
function init() {
  DB.open().then(function() {
    // Request persistent storage to prevent eviction
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().then(function(granted) {
        if (granted) console.log('Persistent storage granted');
      }).catch(function(){});
    }
    // Restore vault mirror if needed
    Vault.restoreFromMirror().then(function() {
      // Set up navigation
      document.querySelectorAll('#nav .nav-item').forEach(function(item) {
        item.addEventListener('click', function() {
          navigateTo(this.dataset.page);
        });
      });

      // Initial render
      renderDashboard();

      // Update header subtitle
      var now = new Date();
      document.getElementById('header-subtitle').textContent =
        now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 · ' +
        ['周日','周一','周二','周三','周四','周五','周六'][now.getDay()];
    });
  }).catch(function(err) {
    console.error('DB init failed:', err);
    document.getElementById('main').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">数据库初始化失败 (DB Init Failed)<br><span style="font-size:10px;">请刷新页面重试 (Please refresh)</span></div></div>';
  });
}

// Run
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

// Expose to global scope for onclick handlers
window.App = App;

})();
</script>
