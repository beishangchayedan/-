/* ================================================================
   CSS Variables — Warm White Minimalist Theme
   ================================================================ */
:root {
  --bg: #f7f8f6;
  --bg-card: #ffffff;
  --bg-warm: #eef3ef;
  --text: #20231f;
  --text-secondary: #5c6f65;
  --text-muted: #8d9a92;
  --border: #d9e1dc;
  --border-light: #e9eee9;
  --accent: #2f6f5e;
  --accent-green: #527c62;

  --radius: 8px;
  --radius-sm: 6px;
  --radius-xs: 5px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-height: 64px;
}

/* ================================================================
   Reset & Base
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

input, textarea, button { font-family: var(--font); }
button { min-height: 40px; }

/* ================================================================
   App Shell
   ================================================================ */
#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh; max-width: 480px; margin: 0 auto;
  position: relative; overflow: hidden;
}

/* Status bar spacer for iPhone notch */
#status-spacer {
  height: env(safe-area-inset-top, 0px);
  min-height: env(safe-area-inset-top, 0px);
  background: var(--bg);
  flex-shrink: 0;
}

/* Header */
#header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 10px 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-light);
}
#header-title {
  font-size: 17px; font-weight: 650; color: var(--text);
  letter-spacing: 0;
}
#header-subtitle { font-size: 10px; color: var(--text-muted); }

/* Main content area — pages */
#main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px 18px;
  contain: layout style;
}
#main > .page { display: none; animation: fadeIn 0.2s ease; }
#main > .page.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translate3d(0,6px,0); } to { opacity: 1; transform: translate3d(0,0,0); } }

/* Bottom Navigation */
#nav {
  display: flex; flex-shrink: 0;
  border-top: 1px solid var(--border-light);
  background: var(--bg);
  padding-bottom: var(--safe-bottom);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 7px 0 6px; gap: 2px;
  cursor: pointer; transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
  border: none; background: none;
  font-family: var(--font);
}
.nav-item .nav-icon { font-size: 22px; line-height: 1; }
.nav-item .nav-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0; }
.nav-item .nav-label-en { font-size: 7px; color: var(--text-muted); opacity: 0.6; }
.nav-item.active .nav-label { color: var(--text); }
.nav-item.active .nav-label-en { color: var(--text-secondary); }

/* ================================================================
   Shared Components
   ================================================================ */
.card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border-light);
  padding: 14px; margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-header {

}
.btn {

  padding: 11px 16px; font-size: 14px; cursor: pointer;
  transition: opacity 0.15s; font-family: var(--font);
  line-height: 1.2;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-small { padding: 7px 11px; font-size: 11px; border-radius: var(--radius-xs); min-height: 32px; }
.btn-block { width: 100%; }

.tag {

}
.tag.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
.tag .tag-icon { font-size: 14px; }

.input {

  background: var(--bg-card); padding: 11px 12px;
  border-radius: var(--radius-sm); font-size: 14px;
  color: var(--text); outline: none;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-muted); }

.dash-total {

}
.dash-total .period {

  letter-spacing: 2px; text-transform: uppercase;
}
.dash-total .amount {
  font-size: 42px; font-weight: 650; color: var(--text);
  margin: 4px 0; letter-spacing: 0;
  overflow-wrap: anywhere;
}
.dash-total .amount .cents { font-size: 18px; color: var(--text-secondary); }
.dash-total .label { font-size: 12px; color: var(--text-secondary); }
.dash-total .change {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  font-size: 11px; margin-top: 4px;
}
.change-down { background: #e7f1ea; color: #3d6d4d; }
.change-up { background: #f5e8e2; color: #93523c; }

.dash-categories { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
.dash-cat {
  min-width: 0; background: var(--bg-card); border-radius: var(--radius-sm);
  padding: 12px 8px; text-align: center; border: 1px solid var(--border-light);
}
.dash-cat .cat-icon { font-size: 22px; margin-bottom: 2px; }
.dash-cat .cat-name { font-size: 10px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dash-cat .cat-name-en { font-size: 7px; color: var(--text-muted); }
.dash-cat .cat-amount { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px; }
.dash-cat .cat-bar {
  width: 100%; height: 3px; background: var(--border-light);
  border-radius: 2px; margin-top: 6px; overflow: hidden;
}
.dash-cat .cat-bar-fill { height: 100%; border-radius: 2px; }

.dash-insight {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 14px 16px; border: 1px solid var(--border-light);
  line-height: 1.6; font-size: 13px; color: var(--text);
}

.dash-backup-warn {
  background: var(--warning-bg); border: 1px solid var(--warning-border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-size: 11px; color: #8c7020; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}

  gap: 12px; margin-bottom: 8px;
}
.month-nav button {

}
.month-nav .month-label { font-size: 13px; color: var(--text); min-width: 112px; text-align: center; }

/* ================================================================
   Add Entry Page
   ================================================================ */
.amount-display {
  text-align: center; padding: 14px 0 16px;
}
.amount-display .currency { font-size: 20px; color: var(--text-secondary); font-weight: 300; }
.amount-display .amount-input {
  font-size: 44px; font-weight: 650; color: var(--text);
  letter-spacing: 0; border: none; background: transparent;
  text-align: center; width: min(72vw, 260px); outline: none;
  font-family: var(--font);
}
.amount-display .amount-label { font-size: 11px; color: var(--text-secondary); }

.calc-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 2px; margin-bottom: 16px;
}
.calc-btn {
  padding: 14px; font-size: 20px; background: var(--bg-card);
  border: 1px solid var(--border-light); cursor: pointer;

}
.calc-btn:active { background: var(--bg-warm); }
.calc-btn.calc-action { font-size: 14px; color: var(--text-secondary); }
.calc-btn.calc-enter { background: var(--text); color: var(--bg); font-size: 14px; }

.cat-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px; margin-bottom: 12px;
}
.cat-chip {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; min-width: 0; min-height: 70px; padding: 9px 4px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-card);
  cursor: pointer; transition: all 0.12s;
}
.cat-chip.selected {
  background: var(--accent); border-color: var(--accent);
}
.cat-chip.selected .cat-chip-name { color: var(--bg); }
.cat-chip.selected .cat-chip-en { color: rgba(250,250,248,0.6); }
.cat-chip .cat-chip-icon { font-size: 18px; }
.cat-chip .cat-chip-name { font-size: 10px; color: var(--text); text-align: center; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cat-chip .cat-chip-en { font-size: 7px; color: var(--text-muted); text-align: center; }

.entry-extras { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.entry-extras .tag { font-size: 10px; }

/* ================================================================
   Transactions Page
   ================================================================ */
.txn-month-header {
  font-size: 12px; color: var(--text-secondary);
  padding: 8px 0; letter-spacing: 0.5px;
  position: sticky; top: 0; background: var(--bg); z-index: 1;
}
.txn-item {
  display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 10px;
  background: var(--bg-card); border-radius: var(--radius-sm);
  padding: 12px 14px; margin-bottom: 6px;
  border: 1px solid var(--border-light);
  border-left: 3px solid var(--accent);

}
.txn-item .txn-icon { font-size: 20px; flex-shrink: 0; }
.txn-item .txn-info { flex: 1; min-width: 0; }
.txn-item .txn-title { font-size: 13px; color: var(--text); }
.txn-item .txn-meta { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.txn-item .txn-amount { font-size: 14px; font-weight: 650; flex-shrink: 0; text-align: right; }

.txn-item .txn-amount.income { color: #5c7a52; }

.filter-bar {
  display: flex; gap: 6px; margin-bottom: 12px;
  overflow-x: auto; padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }

.search-bar {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.search-bar .input { flex: 1; padding: 10px 12px; font-size: 12px; }

/* ================================================================
   Vault Page
   ================================================================ */
.pin-display {
  display: flex; gap: 9px; justify-content: center;
  margin: 18px 0;
}
.pin-dot {
  width: 13px; height: 13px; border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent; transition: background 0.15s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }

.pin-pad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; max-width: 280px; margin: 0 auto;
}
.pin-key {
  display: flex; align-items: center; justify-content: center;
  min-height: 58px; padding: 12px; font-size: 22px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font); color: var(--text);
  text-align: center;
}
.pin-key:active { background: var(--bg-warm); }
.pin-key.pin-del { font-size: 12px; color: var(--text-secondary); }

.vault-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border-radius: var(--radius-sm);
  padding: 13px; margin-bottom: 8px;
  border: 1px solid var(--border-light); cursor: pointer;
}
.vault-item .vault-icon { font-size: 24px; flex-shrink: 0; }
.vault-item .vault-info { flex: 1; min-width: 0; }
.vault-item .vault-title { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.vault-detail-field {

.vault-detail-field .field-label { font-size: 11px; color: var(--text-secondary); }

.vault-security-note {

  border: 1px solid #cfe2d5;
  border-radius: var(--radius);

  padding: 10px 12px;
  margin: 12px 0;
}
.vault-security-note.danger {
  background: #fff0ed;
  border-color: #efc4bb;
  color: var(--danger);
}

/* ================================================================
   Modal / Overlay
   ================================================================ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  z-index: 100; display: flex; align-items: flex-end;
  justify-content: center;
}
.modal-sheet {
  background: var(--bg); border-radius: 14px 14px 0 0;
  width: 100%; max-width: 480px; max-height: 80vh;
  overflow-y: auto; padding: 20px 20px calc(20px + var(--safe-bottom));
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.modal-title { font-size: 16px; color: var(--text); }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); }

/* ================================================================
   Toast
   ================================================================ */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  width: min(calc(100% - 32px), 420px);
  background: var(--text); color: var(--bg); padding: 10px 16px;
  border-radius: 999px; font-size: 12px; z-index: 200;
  text-align: center;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ================================================================
   Empty State
   ================================================================ */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 13px; }

/* ================================================================

   ================================================================ */
.hidden { display: none !important; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-8 { gap: 8px; }

@media (min-width: 420px) {
  .cat-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .amount-display .amount-input { font-size: 50px; }
}

@media (max-width: 360px) {

  #main { padding-left: 12px; padding-right: 12px; }
  .dash-total .amount { font-size: 36px; }
  .search-bar { flex-wrap: wrap; }
  .search-bar .btn { width: 100%; }
  .pin-key { min-height: 54px; }
}
</style>

/* ================================================================
   Database Layer — IndexedDB
   ================================================================ */
var DB = {
  _db: null,
  _name: 'AussieLedgerDB',
  _version: 2,

  open: function() {
    var self = this;
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(self._name, self._version);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('expenses')) {
          var expStore = db.createObjectStore('expenses', { keyPath: 'id' });
          expStore.createIndex('date', 'date', { unique: false });
          expStore.createIndex('category', 'category', { unique: false });
        }
        if (!db.objectStoreNames.contains('vault')) {
          db.createObjectStore('vault', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('attachments')) {
          var attStore = db.createObjectStore('attachments', { keyPath: 'id' });
          attStore.createIndex('expenseId', 'expenseId', { unique: false });
        }
      };
      req.onsuccess = function(e) {
        self._db = e.target.result;
        resolve(self._db);
      };
      req.onerror = function(e) { reject(e.target.error); };
    });
  },

  ensure: function() {
    var self = this;
    if (self._db) return Promise.resolve(self._db);
    return self.open();
  },

  // --- Expense CRUD ---
  addExpense: function(record) {
    var self = this;
    return self.ensure().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('expenses', 'readwrite');
        tx.objectStore('expenses').add(record);
        tx.oncomplete = function() { resolve(record); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    });
  },

  updateExpense: function(record) {
    var self = this;
    return self.ensure().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('expenses', 'readwrite');
        tx.objectStore('expenses').put(record);
        tx.oncomplete = function() { resolve(record); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    });
  },

  deleteExpense: function(id) {
    var self = this;
    return self.ensure().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('expenses', 'readwrite');
        tx.objectStore('expenses').delete(id);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    });
  },

  getExpenses: function(options) {
    var self = this;
    options = options || {};
    return self.ensure().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('expenses', 'readonly');
        var store = tx.objectStore('expenses');
        var results = [];

        if (options.month) {
          // options.month = '2026-06'
          var prefix = options.month;
          var index = store.index('date');
          var range = IDBKeyRange.bound(prefix + '-01', prefix + '-31');
          var req = index.openCursor(range);
          req.onsuccess = function(e) {
            var cursor = e.target.result;
            if (cursor) {
              if (cursor.value.date.startsWith(prefix)) {
                results.push(cursor.value);
              }
              cursor.continue();
            } else {
              // Sort by date descending, then by createdAt descending
              results.sort(function(a,b) {
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return b.createdAt - a.createdAt;
              });
              resolve(results);
            }
          };
          req.onerror = function(e) { reject(e.target.error); };
        } else if (options.category) {
          var idx = store.index('category');
          var req2 = idx.getAll(options.category);
          req2.onsuccess = function(e) { resolve(e.target.result); };
          req2.onerror = function(e) { reject(e.target.error); };
        } else {
          var req3 = store.getAll();
          req3.onsuccess = function(e) {
            var all = e.target.result;
            all.sort(function(a,b) { return b.date.localeCompare(a.date) || b.createdAt - a.createdAt; });
            resolve(all);
          };
          req3.onerror = function(e) { reject(e.target.error); };
        }
      });
    });
  },

  getAllExpenses: function() {
    var self = this;
    return self.ensure().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('expenses', 'readonly');
        var req = tx.objectStore('expenses').getAll();
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    });
  },

  // --- Vault CRUD ---
  addVaultRecord: function(record) {

/* ================================================================
   Image Compression
   ================================================================ */
function compressImage(file) {
  return new Promise(function(resolve, reject) {
    // Only process images
    if (!file.type.match(/^image\//)) { reject(new Error('Not an image')); return; }

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var maxDim = 600;
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob) {
          resolve({ blob: blob, width: w, height: h, sizeBytes: blob.size });
        }, 'image/jpeg', 0.5);
      };
      img.onerror = function() { reject(new Error('Failed to load image')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('Failed to read file')); };
    reader.readAsDataURL(file);
  });
}

/* ================================================================
   Crypto Module — PBKDF2 + AES-256-GCM
   ================================================================ */
var Crypto = {
  _encoder: new TextEncoder(),
  _decoder: new TextDecoder(),
  KDF_ITERATIONS: 250000,
  LEGACY_ITERATIONS: 100000,

  isAvailable: function() {
    return !!(window.isSecureContext && window.crypto && crypto.subtle && crypto.getRandomValues);
  },

  unavailableReason: function() {
    if (!window.isSecureContext) {
      return '当前打开地址不是安全上下文。请使用 HTTPS、localhost，或打包成手机 App 后再设置 PIN。';
    }
    if (!window.crypto || !crypto.subtle) {
      return '当前浏览器不支持 Web Crypto 加密 API。';
    }
    return '当前环境无法启用安全加密。';
  },

  requireAvailable: function() {
    if (!this.isAvailable()) return Promise.reject(new Error(this.unavailableReason()));
    return Promise.resolve();
  },

  deriveBits: function(pin, salt, bitLength, iterations) {
    var self = this;
    var keyMaterial = self._encoder.encode(pin);
    return self.requireAvailable()
      .then(function() {
        return crypto.subtle.importKey('raw', keyMaterial, 'PBKDF2', false, ['deriveBits']);
      })
      .then(function(baseKey) {
        return crypto.subtle.deriveBits(
          { name: 'PBKDF2', salt: salt, iterations: iterations || self.KDF_ITERATIONS, hash: 'SHA-256' },
          baseKey, bitLength || 256
        );
      });
  },

  // Derive a PIN verifier. This is not used as the encryption key.
  deriveAuthHash: function(pin, salt, iterations) {
    var self = this;
    return self.deriveBits(pin, salt, 256, iterations).then(function(bits) {
      return self._arrayBufferToBase64(bits);
    });
  },

  // Derive an AES-GCM key from a different salt than the PIN verifier.
  deriveAesKey: function(pin, salt, iterations) {
    var self = this;
    return self.deriveBits(pin, salt, 256, iterations).then(function(bits) {
      return crypto.subtle.importKey('raw', bits, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    });
  },

  // Generate random salt
  generateSalt: function() {
    return crypto.getRandomValues(new Uint8Array(16));
  },

  // Hash PIN for verification
  hashPin: function(pin, salt) {
    return this.deriveAuthHash(pin, salt, this.LEGACY_ITERATIONS);
  },

  // Encrypt plaintext with derived key
  encrypt: function(plaintext, key) {
    if (!key) return Promise.reject(new Error('保险库未解锁，不能保存敏感信息。'));
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var data = this._encoder.encode(plaintext);
    return this.requireAvailable()
      .then(function() { return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, data); })
      .then(function(ciphertext) {
        return {
          iv: this._arrayBufferToBase64(iv),
          ciphertext: this._arrayBufferToBase64(new Uint8Array(ciphertext))
        };
      }.bind(this));
  },

  // Decrypt ciphertext with derived key
  decrypt: function(encryptedObj, key) {
    if (!key) return Promise.reject(new Error('保险库未解锁，不能读取敏感信息。'));
    var iv = this._base64ToArrayBuffer(encryptedObj.iv);
    var ciphertext = this._base64ToArrayBuffer(encryptedObj.ciphertext);
    return this.requireAvailable()
      .then(function() { return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext); })
      .then(function(plaintext) {
        return this._decoder.decode(plaintext);
      }.bind(this));
  },

  _arrayBufferToBase64: function(buffer) {
    var bytes = new Uint8Array(buffer);
    var binary = '';
    for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  },

  _base64ToArrayBuffer: function(base64) {
    var binary = atob(base64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }
};

/* ================================================================
   Settings Manager
   ================================================================ */
var Settings = {
  _key: 'ledger_settings',

  get: function() {
    try {
      var raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },

  set: function(obj) {
    localStorage.setItem(this._key, JSON.stringify(obj));
  },

  hasPin: function() {
    var s = this.get();
    return !!(s && ((s.securityVersion === 2 && s.pinHash && s.authSaltBase64 && s.keySaltBase64) || (s.pinHash && s.saltBase64)));
  },

  setPin: function(pin) {
    var self = this;
    return Crypto.requireAvailable().then(function() {
      var authSalt = Crypto.generateSalt();
      var keySalt = Crypto.generateSalt();
      var existing = self.get() || {};
      var iterations = Crypto.KDF_ITERATIONS;
      return Crypto.deriveAuthHash(pin, authSalt, iterations).then(function(hash) {
        var settings = {
          securityVersion: 2,
          kdf: 'PBKDF2-SHA-256',
          cipher: 'AES-256-GCM',
          iterations: iterations,
          pinHash: hash,
          authSaltBase64: Crypto._arrayBufferToBase64(authSalt),
          keySaltBase64: Crypto._arrayBufferToBase64(keySalt),
          backupReminderDays: existing.backupReminderDays || 7,
          lastBackupDate: existing.lastBackupDate || null,
          lastExportDate: existing.lastExportDate || null,
          exchangeRate: existing.exchangeRate || 4.7,
          updatedAt: new Date().toISOString()
        };
        self.set(settings);
        return Crypto.deriveAesKey(pin, keySalt, iterations);
      });
    });
  },

  setLegacyPin: function(pin) {
    var self = this;
    var salt = Crypto.generateSalt();
    return Crypto.hashPin(pin, salt).then(function(hash) {
      self.set({
        pinHash: hash,
        saltBase64: Crypto._arrayBufferToBase64(salt),
        backupReminderDays: 7,
        lastBackupDate: null,
        lastExportDate: null
      });
    });
  },

  verifyPin: function(pin) {
    var self = this;
    var s = self.get();
    if (!s || !s.pinHash) return Promise.resolve(false);
    if (s.securityVersion === 2 && s.authSaltBase64) {
      var authSalt = Crypto._base64ToArrayBuffer(s.authSaltBase64);
      return Crypto.deriveAuthHash(pin, authSalt, s.iterations || Crypto.KDF_ITERATIONS).then(function(hash) {
        return hash === s.pinHash;
      });
    }
    if (!s.saltBase64) return Promise.resolve(false);
    var legacySalt = Crypto._base64ToArrayBuffer(s.saltBase64);
    return Crypto.hashPin(pin, legacySalt).then(function(hash) {
      return hash === s.pinHash;
    });
  },

  getSalt: function() {
    var s = this.get();
    if (!s || !s.saltBase64) return null;
    return Crypto._base64ToArrayBuffer(s.saltBase64);
  },

  updateBackupDate: function() {
    var s = this.get() || {};
    s.lastBackupDate = new Date().toISOString().slice(0,10);
    this.set(s);
  },

  daysSinceBackup: function() {
    var s = this.get();
    if (!s || !s.lastBackupDate) return 999;
    var last = new Date(s.lastBackupDate);
    var now = new Date();
    return Math.floor((now - last) / (1000*60*60*24));
  },

  getExchangeRate: function() {
    var s = this.get();
    return (s && s.exchangeRate) ? s.exchangeRate : 4.7;
  },

  saveExchangeRate: function(rate) {
    var s = this.get() || {};
    s.exchangeRate = parseFloat(rate);
    this.set(s);
  }
};

/* ================================================================
   Vault Manager — Encrypted storage
   ================================================================ */
var Vault = {
  _mirrorKey: 'ledger_vault_mirror',

  isUnlocked: false,
  _derivedKey: null,

  setUnlockedKey: function(key) {
    this._derivedKey = key;
    this.isUnlocked = true;
  },

  unlock: function(pin) {
    var self = this;
    return Crypto.requireAvailable().then(function() {
      var s = Settings.get();
      if (!s || !s.pinHash) return false;

      if (s.securityVersion === 2 && s.authSaltBase64 && s.keySaltBase64) {
        var authSalt = Crypto._base64ToArrayBuffer(s.authSaltBase64);
        var keySalt = Crypto._base64ToArrayBuffer(s.keySaltBase64);
        var iterations = s.iterations || Crypto.KDF_ITERATIONS;
        return Crypto.deriveAuthHash(pin, authSalt, iterations).then(function(hash) {
          if (hash !== s.pinHash) return false;
          return Crypto.deriveAesKey(pin, keySalt, iterations).then(function(key) {
            self.setUnlockedKey(key);
            return true;
          });
        });
      }

      if (!s.saltBase64) return false;
      var legacySalt = Crypto._base64ToArrayBuffer(s.saltBase64);
      return Crypto.hashPin(pin, legacySalt).then(function(hash) {
        if (hash !== s.pinHash) return false;
        var legacyKeyBytes = Crypto._base64ToArrayBuffer(hash);
        return crypto.subtle.importKey('raw', legacyKeyBytes, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt'])
          .then(function(key) {
            self.setUnlockedKey(key);
            return self._migrateLegacyCrypto(pin).catch(function(err) {
              console.error('Legacy vault migration failed:', err);
            }).then(function() {
              return true;
            });
          });
      });
    });
  },

  lock: function() {
    this.isUnlocked = false;
    this._derivedKey = null;
  },

  requireUnlocked: function() {
    if (!this.isUnlocked || !this._derivedKey) {
      return Promise.reject(new Error('保险库未解锁，不能操作敏感信息。'));
    }
    return Promise.resolve();
  },

  add: function(plainRecord) {
    var self = this;
    return self.requireUnlocked().then(function() {
      return Crypto.encrypt(JSON.stringify(plainRecord), self._derivedKey);
    })
      .then(function(encrypted) {
        var vaultRecord = {
          id: plainRecord.id,
          encrypted: encrypted,
          createdAt: plainRecord.createdAt,
          updatedAt: plainRecord.updatedAt,
          securityVersion: 2
        };
        return DB.addVaultRecord(vaultRecord).then(function() {
          self._updateMirror();
          return vaultRecord;
        });
      });
  },

  update: function(plainRecord) {
    var self = this;
    return self.requireUnlocked().then(function() {
      return Crypto.encrypt(JSON.stringify(plainRecord), self._derivedKey);
    })
      .then(function(encrypted) {
        var vaultRecord = {
          id: plainRecord.id,
          encrypted: encrypted,
          createdAt: plainRecord.createdAt,
          updatedAt: Date.now(),
          securityVersion: 2
        };
        return DB.updateVaultRecord(vaultRecord).then(function() {
          self._updateMirror();
          return vaultRecord;
        });
      });
  },

  remove: function(id) {
    var self = this;
    return DB.deleteVaultRecord(id).then(function() {
      self._updateMirror();
    });
  },

  getAllDecrypted: function() {
    var self = this;
    return self.requireUnlocked().then(function() {
      return DB.getAllVaultRecords();
    }).then(function(records) {
      return Promise.all(records.map(function(r) {
        return Crypto.decrypt(r.encrypted, self._derivedKey)
          .then(function(plain) {
            var obj = JSON.parse(plain);
            return {
              id: obj.id || r.id,
              type: obj.type || r.type || 'other',
              title: obj.title || r.title || '未命名',
              fields: obj.fields || [],
              createdAt: r.createdAt,
              updatedAt: r.updatedAt
            };
          })
          .catch(function() { return null; });
      })).then(function(results) {
        return results.filter(Boolean);
      });
    });
  },

  getDecrypted: function(id) {
    var self = this;
    return self.requireUnlocked().then(function() {
      return DB.getAllVaultRecords();
    }).then(function(records) {
      var found = records.find(function(r) { return r.id === id; });
      if (!found) return null;
      return Crypto.decrypt(found.encrypted, self._derivedKey)
        .then(function(plain) {
          var obj = JSON.parse(plain);
          return {
            id: obj.id || found.id, type: obj.type || found.type || 'other', title: obj.title || found.title || '未命名',
            fields: obj.fields || [], createdAt: found.createdAt, updatedAt: found.updatedAt
          };
        });
    });
  },

  _updateMirror: function() {
    try { localStorage.removeItem(Vault._mirrorKey); } catch(e) {}
  },

  restoreFromMirror: function() {
    try {
      var raw = localStorage.getItem(this._mirrorKey);
      if (!raw) return Promise.resolve(false);
      var records = JSON.parse(raw);
      return Promise.all(records.map(function(r) {
        return DB.addVaultRecord(r).catch(function() { return DB.updateVaultRecord(r); });
      })).then(function() {
        localStorage.removeItem(Vault._mirrorKey);
        return true;
      });
    } catch(e) { return Promise.resolve(false); }
  },

  _migrateLegacyCrypto: function(pin) {
    var self = this;
    return self.getAllDecrypted().then(function(records) {
      return Settings.setPin(pin).then(function(newKey) {
        self.setUnlockedKey(newKey);
        return Promise.all(records.map(function(record) {
          return self.update(record);
        }));
      });
    });
  }
};

/* ================================================================
   Utility Functions
   ================================================================ */
function uid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}

function formatAmount(cents, currency) {
  var neg = cents < 0;
  var abs = Math.abs(cents);
  var dollars = Math.floor(abs / 100);
  var c = abs % 100;
  var symbol = (currency === 'CNY') ? '¥' : '$';
  return (neg ? '-' : '') + symbol + dollars.toLocaleString() + '.' + (c < 10 ? '0' : '') + c;
}

function toAudCents(cents, currency, rate) {
  if (currency === 'CNY') return Math.round(cents / (rate || Settings.getExchangeRate()));
  return cents;
}

function getMonthStr(date) {
  // '2026-06-07' -> '2026-06'
  return date.slice(0, 7);
}

function getMonthLabel(monthStr) {
  // '2026-06' -> '2026年6月'
  var parts = monthStr.split('-');
  return parts[0] + '年' + parseInt(parts[1],10) + '月';
}

function getMonthLabelEn(monthStr) {
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var parts = monthStr.split('-');
  return months[parseInt(parts[1],10)-1] + ' ' + parts[0];
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function currentMonthStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function categoryById(id) {
  return CATEGORIES.find(function(c) { return c.id === id; });
}

function paymentById(id) {
  return PAYMENT_METHODS.find(function(p) { return p.id === id; });
}

function vaultTypeById(id) {
  return VAULT_TYPES.find(function(t) { return t.id === id; });
}

/* ================================================================

function showModal(title, contentHtml, onClose) {
  var container = document.getElementById('modal-container');
  var html = '<div class="modal-overlay" onclick="if(event.target===this)this.remove()">';
  html += '<div class="modal-sheet">';
  html += '<div class="modal-header">';
  html += '<span class="modal-title">' + title + '</span>';
  html += '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">✕</button>';
  html += '</div>';
  html += contentHtml;
  html += '</div></div>';
  container.innerHTML = html;
  var overlay = container.querySelector('.modal-overlay');
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) { overlay.remove(); if (onClose) onClose(); }
  });
  return overlay;
}

/* ================================================================
   Navigation
   ================================================================ */
function navigateTo(pageName) {
  // Hide all pages
  var pages = document.querySelectorAll('#main > .page');
  pages.forEach(function(p) { p.classList.remove('active'); });

  // Show target page
  var target = document.getElementById('page-' + pageName);
  if (target) target.classList.add('active');

  // Update nav
  var items = document.querySelectorAll('#nav .nav-item');
  items.forEach(function(item) {
    item.classList.remove('active');
    if (item.dataset.page === pageName) item.classList.add('active');
  });

  // Render page
  switch(pageName) {
    case 'dashboard': renderDashboard(); break;
    case 'add': renderAddEntry(); break;
    case 'transactions': renderTransactions(); break;
    case 'vault': renderVault(); break;
  }

  // Scroll main to top
  document.getElementById('main').scrollTop = 0;
}

var dashMonth = currentMonthStr();

function renderDashboard() {
  var month = dashMonth;
  var html = '';

  // Backup warning
  var days = Settings.daysSinceBackup();
  if (days >= 5 && Settings.hasPin()) {
    html += '<div class="dash-backup-warn" onclick="App.showBackupModal()">⚠️ ' +
      (days >= 999 ? '尚未备份 (Never backed up)' : '已 ' + days + ' 天未备份 (Days since last backup)') +
      ' — 点击导出 (Tap to export)</div>';
  }

  // Month navigation
  html += '<div class="month-nav">';
  html += '<button onclick="App.prevMonth()">◀</button>';
  html += '<span class="month-label">' + getMonthLabel(month) + ' <span style="font-size:10px;color:var(--text-muted)">' + getMonthLabelEn(month) + '</span></span>';
  html += '<button onclick="App.nextMonth()">▶</button>';
  html += '</div>';

  document.getElementById('page-dashboard').innerHTML = html;

  // Load data async
  DB.getExpenses({ month: month }).then(function(expenses) {
    renderDashboardData(month, expenses);
  });
}

function renderDashboardData(month, expenses) {
  var audTotal = 0, cnyTotal = 0;
  var catTotals = {};
  var lastMonthAud = 0, lastMonthCny = 0;
  var rate = Settings.getExchangeRate();

  expenses.forEach(function(e) {
    if (e.category === 'income') {
      // Don't count income in spending total
    } else {
      if (e.currency === 'CNY') cnyTotal += e.amount;
      else audTotal += e.amount;
      catTotals[e.category] = (catTotals[e.category] || 0) + toAudCents(e.amount, e.currency, rate);
    }
  });

  // Get last month for comparison
  var parts = month.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  if (m === 1) { y--; m = 12; } else { m--; }
  var lastMonth = y + '-' + String(m).padStart(2,'0');

  // Get exchange rate from settings (default ~4.7 CNY per AUD)
  // Convert CNY to AUD-equivalent for combined total
  var cnyEquivalent = Math.round(cnyTotal / rate);
  var combinedTotal = audTotal + cnyEquivalent;
  var isMultiCurrency = (audTotal > 0 && cnyTotal > 0);

  DB.getExpenses({ month: lastMonth }).then(function(lastExpenses) {
    lastExpenses.forEach(function(e) {
      if (e.category !== 'income') {
        if (e.currency === 'CNY') lastMonthCny += e.amount;
        else lastMonthAud += e.amount;
      }
    });
    var lastCnyEquiv = Math.round(lastMonthCny / rate);
    var lastCombined = lastMonthAud + lastCnyEquiv;

    var changeHtml = '';
    if (lastCombined > 0) {
      var pct = Math.round((combinedTotal - lastCombined) / lastCombined * 100);
      if (pct > 0) {
        changeHtml = '<div class="change change-up">↑ ' + pct + '% 较上月 (vs last month)</div>';
      } else if (pct < 0) {
        changeHtml = '<div class="change change-down">↓ ' + Math.abs(pct) + '% 较上月 (vs last month)</div>';
      } else {
        changeHtml = '<div class="change" style="background:#f0ebe0;color:#8c7b6b;">持平 (No change)</div>';
      }
    }

    // Sort categories by amount descending, exclude income
    var sorted = Object.entries(catTotals).filter(function(e) { return e[0] !== 'income'; }).sort(function(a,b) { return b[1]-a[1]; });
    var top3 = sorted.slice(0, 3);
    var maxCat = top3.length > 0 ? top3[0][1] : 1;

    var catHtml = '';
    top3.forEach(function(entry) {
      var cat = categoryById(entry[0]);
      if (!cat) return;
      var pct = Math.round(entry[1] / maxCat * 100);
      catHtml += '<div class="dash-cat">' +
        '<div class="cat-icon">' + cat.icon + '</div>' +
        '<div class="cat-name">' + cat.zh + '</div>' +
        '<div class="cat-name-en">' + cat.en + '</div>' +
        '<div class="cat-amount">' + formatAmount(entry[1], 'AUD') + '</div>' +
        '<div class="cat-bar"><div class="cat-bar-fill" style="width:' + pct + '%;background:' + cat.color + ';"></div></div>' +
        '</div>';
    });

    // Weekly insight
    var weekExpenses = expenses.filter(function(e) {
      if (e.category === 'income') return false;
      var d = new Date(e.date);
      var now = new Date();
      var weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
      return d >= weekAgo;
    });
    var weekTotal = weekExpenses.reduce(function(s, e) { return s + toAudCents(e.amount, e.currency, rate); }, 0);

    // Find top category this week
    var weekCat = {};
    weekExpenses.forEach(function(e) {
      if (e.category !== 'income') weekCat[e.category] = (weekCat[e.category] || 0) + toAudCents(e.amount, e.currency, rate);
    });
    var weekTopCat = Object.entries(weekCat).sort(function(a,b) { return b[1]-a[1]; })[0];
    var insightHtml = '';
    if (weekTopCat) {
      var wc = categoryById(weekTopCat[0]);
      insightHtml = '本周支出 <strong>' + formatAmount(weekTotal, 'AUD') + '</strong>';
      if (lastCombined > 0) {
        var weekAvg = lastCombined / 4;
        if (weekTotal > weekAvg) {
          insightHtml += '，高于周均水平。';
        } else {
          insightHtml += '，<strong style="color:#5c7a52;">低于周均</strong>，控制得当 👍';
        }
      }
      insightHtml += ' 最大支出：' + (wc ? wc.icon + ' ' + wc.zh : '—') + ' ' + formatAmount(weekTopCat[1], 'AUD') + '。';
    } else {
      insightHtml = '本周暂无支出记录。开始记账吧 ✍️';
    }

    var container = document.getElementById('page-dashboard');
    var existingTotal = container.querySelector('.dash-total');
    var existingCats = container.querySelector('.dash-categories');
    var existingInsight = container.querySelector('.dash-insight');

    var currencyDetail = '';
    if (isMultiCurrency) {
      currencyDetail = '<div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">AUD $' + (audTotal/100).toFixed(2) + ' + CNY ¥' + (cnyTotal/100).toFixed(2) + ' (≈' + rate.toFixed(1) + ':1)</div>';
    } else if (cnyTotal > 0) {
      currencyDetail = '<div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">CNY ¥' + (cnyTotal/100).toFixed(2) + '</div>';
    }

    var totalHtml = '<div class="dash-total">' +
      '<div class="period">' + getMonthLabel(month) + ' (Monthly Spending)</div>' +
      '<div class="amount">' + formatAmount(combinedTotal, 'AUD') + '</div>' +
      currencyDetail +
      changeHtml +
      '</div>';

    var catsHtml = top3.length > 0 ? '<div class="card-header">📊 分类占比 (Category Breakdown)</div><div class="dash-categories">' + catHtml + '</div>' : '';

    var insightFullHtml = '<div class="dash-insight">' +
      '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">📝 本周洞察 (Weekly Insight)</div>' +
      insightHtml +
      '</div>';

    // Preserve month nav, replace data sections
    var navHtml = container.querySelector('.month-nav') ? container.querySelector('.month-nav').outerHTML : '';
    var warnHtml = container.querySelector('.dash-backup-warn') ? container.querySelector('.dash-backup-warn').outerHTML : '';
    container.innerHTML = warnHtml + navHtml + totalHtml + catsHtml + insightFullHtml;
  });
}

function onAmountInput(val) {
  // Allow only numbers and one decimal point
  var cleaned = val.replace(/[^0-9.]/g, '');
  // Only allow one decimal point
  var parts = cleaned.split('.');
  if (parts.length > 2) cleaned = parts[0] + '.' + parts.slice(1).join('');
  // Limit to 2 decimal places
  if (parts.length === 2 && parts[1].length > 2) {
    cleaned = parts[0] + '.' + parts[1].slice(0,2);
  }
  document.getElementById('amount-input').value = cleaned;
  addState.amount = cleaned;
}

function selectCategory(catId) {
  // Toggle: click again to deselect
  if (addState.category === catId) {
    addState.category = null;
    document.querySelectorAll('#cat-grid .cat-chip').forEach(function(chip) {
      chip.classList.remove('selected');
    });
    return;
  }
  addState.category = catId;
  var chips = document.querySelectorAll('#cat-grid .cat-chip');
  chips.forEach(function(chip) {
    chip.classList.remove('selected');
    if (chip.dataset.cat === catId) chip.classList.add('selected');
  });
}

function selectPayment(pmId) {
  // Toggle: click again to deselect
  if (addState.paymentMethod === pmId) {
    addState.paymentMethod = null;
    document.querySelectorAll('#payment-methods .tag').forEach(function(t) {
      t.classList.remove('selected');
    });
    return;
  }
  addState.paymentMethod = pmId;
  var tags = document.querySelectorAll('#payment-methods .tag');
  tags.forEach(function(t) {
    t.classList.remove('selected');
    if (t.dataset.pm === pmId) t.classList.add('selected');
  });
}

function toggleCurrency() {
  if (addState.currency === 'AUD') {
    addState.currency = 'CNY';
  } else {
    addState.currency = 'AUD';
  }
  var label = document.getElementById('currency-label');
  var symbol = document.getElementById('currency-symbol');
  var toggleBtn = document.querySelector('[onclick*="toggleCurrency"]');
  if (addState.currency === 'CNY') {
    if (label) label.textContent = '金额 (Amount) · CNY ¥';
    if (symbol) symbol.textContent = '¥';
    if (toggleBtn) toggleBtn.innerHTML = '🔄 切换 AUD';
  } else {
    if (label) label.textContent = '金额 (Amount) · AUD $';
    if (symbol) symbol.textContent = '$';
    if (toggleBtn) toggleBtn.innerHTML = '🔄 切换 CNY';
  }
}

function saveExchangeRate() {
  var input = document.getElementById('exchange-rate-input');
  if (!input) return;
  var rate = parseFloat(input.value);
  if (isNaN(rate) || rate <= 0) {
    showToast('请输入有效汇率 (Enter a valid rate)');
    return;
  }
  Settings.saveExchangeRate(rate);
  showToast('✅ 汇率已保存 (Rate Saved): 1 AUD = ' + rate + ' CNY');
  // Refresh dashboard if visible
  if (document.getElementById('page-dashboard').classList.contains('active')) {
    renderDashboard();
  }
}

function onImagePicked(input) {
  var file = input.files[0];
  if (!file) return;
  compressImage(file).then(function(result) {
    var imgId = uid();
    addState.pendingImages.push({ id: imgId, blob: result.blob, width: result.width, height: result.height, sizeBytes: result.sizeBytes, fileName: file.name });
    renderPendingThumbnails();
  }).catch(function(err) {
    showToast('❌ 图片处理失败 (Image failed): ' + err.message);
  });
  input.value = ''; // Allow re-selecting same file
}

function removePendingImage(imgId) {
  addState.pendingImages = addState.pendingImages.filter(function(img) { return img.id !== imgId; });
  renderPendingThumbnails();
}

function renderPendingThumbnails() {
  var container = document.getElementById('pending-images');
  if (!container) return;
  var html = '';
  addState.pendingImages.forEach(function(img) {
    var url = URL.createObjectURL(img.blob);
    html += '<div style="position:relative;flex-shrink:0;width:60px;height:60px;border-radius:6px;overflow:hidden;border:1px solid var(--border);">';
    html += '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;" onclick="App.viewFullscreenImage(\'' + img.id + '\')">';
    html += '<span onclick="App.removePendingImage(\'' + img.id + '\')" style="position:absolute;top:1px;right:3px;font-size:14px;color:#c44;cursor:pointer;line-height:1;">✕</span>';
    html += '</div>';
  });
  html += '<div style="font-size:9px;color:var(--text-muted);flex-shrink:0;display:flex;align-items:center;">' +
    (addState.pendingImages.length > 0 ? addState.pendingImages.length + ' 张 (pics) · ' + formatBytes(addState.pendingImages.reduce(function(s,i){return s+i.sizeBytes;},0)) : '') +
    '</div>';
  container.innerHTML = html;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function viewFullscreenImage(pendingId) {
  var img = addState.pendingImages.find(function(p) { return p.id === pendingId; });
  if (!img) return;
  var url = URL.createObjectURL(img.blob);
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:flex;align-items:center;justify-content:center;';
  overlay.onclick = function() { overlay.remove(); };
  var imgEl = document.createElement('img');
  imgEl.src = url;
  imgEl.style.cssText = 'max-width:95%;max-height:95%;object-fit:contain;border-radius:8px;';
  overlay.appendChild(imgEl);
  document.body.appendChild(overlay);
}

function recordExpense() {
  var amountStr = addState.amount;
  if (!amountStr || isNaN(parseFloat(amountStr)) || parseFloat(amountStr) <= 0) {
    showToast('请输入有效金额 (Enter a valid amount)'); return;
  }
  if (!addState.category) {
    showToast('请选择分类 (Select a category)'); return;
  }

  var dollars = parseFloat(amountStr);
  var cents = Math.round(dollars * 100);

  var expenseId = uid();
  var record = {
    id: expenseId,
    amount: addState.category === 'income' ? -cents : cents,
    category: addState.category,
    currency: addState.currency,
    note: addState.note || null,
    date: addState.date,
    isTaxDeductible: addState.isTaxDeductible,
    paymentMethod: addState.category === 'income' ? 'transfer' : addState.paymentMethod,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };

  DB.addExpense(record).then(function() {
    // Save pending images
    var imgPromises = addState.pendingImages.map(function(img) {
      return DB.addAttachment({
        id: img.id,
        expenseId: expenseId,
        fileName: img.fileName,
        blob: img.blob,
        width: img.width,
        height: img.height,
        sizeBytes: img.sizeBytes,
        createdAt: Date.now()
      });
    });
    return Promise.all(imgPromises);
  }).then(function() {
    var cat = categoryById(addState.category);
    var imgCount = addState.pendingImages.length > 0 ? ' 📷×' + addState.pendingImages.length : '';
    showToast('✅ 已记录 (Recorded): ' + cat.icon + ' ' + formatAmount(cents, addState.currency) + imgCount);
    // Reset form
    addState.amount = '';
    addState.category = null;
    addState.note = '';
    addState.isTaxDeductible = false;
    addState.currency = 'AUD';
    addState.pendingImages = [];
    renderAddEntry();
    document.getElementById('amount-input').focus();
  }).catch(function(err) {
    showToast('❌ 记录失败 (Failed): ' + err.message);
  });
}

    html += '<span class="tag' + (txnFilter.category === cat.id ? ' selected' : '') + '" onclick="App.onTxnFilter(\'' + cat.id + '\')">' + cat.icon + ' ' + cat.zh + '</span>';
  });
  html += '</div>';

  // Month selector
  html += '<div class="month-nav">';
  html += '<button onclick="App.txnPrevMonth()">◀</button>';
  html += '<span class="month-label">' + getMonthLabel(txnFilter.month) + '</span>';
  html += '<button onclick="App.txnNextMonth()">▶</button>';
  html += '</div>';

  // List container
  html += '<div id="txn-list"></div>';

  document.getElementById('page-transactions').innerHTML = html;

  // Load data
  loadTransactions();
}

function loadTransactions() {
  DB.getExpenses({ month: txnFilter.month }).then(function(expenses) {
    var search = txnFilter.search.toLowerCase();
    var catFilter = txnFilter.category;

    var filtered = expenses.filter(function(e) {
      if (catFilter && e.category !== catFilter) return false;
      if (search) {
        var cat = categoryById(e.category);
        var matchCat = cat && (cat.zh.includes(search) || cat.en.toLowerCase().includes(search));
        var matchNote = e.note && e.note.toLowerCase().includes(search);
        if (!matchCat && !matchNote) return false;
      }
      return true;
    });

    var listEl = document.getElementById('txn-list');
    if (!listEl) return;

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无记录 (No records)<br><span style="font-size:10px;">去记账页面添加一笔吧</span></div></div>';
      return;
    }

    // Group by date
    var groups = {};
    filtered.forEach(function(e) {
      if (!groups[e.date]) groups[e.date] = [];
      groups[e.date].push(e);
    });

    var html = '';
    var rate = (Settings.get() && Settings.get().exchangeRate) ? Settings.get().exchangeRate : 4.7;
    var dates = Object.keys(groups).sort().reverse();
    dates.forEach(function(date) {
      var items = groups[date];
      var audDay = 0, cnyDay = 0;
      items.forEach(function(e) {
        if (e.category === 'income') return; // skip income in daily total
        if (e.currency === 'CNY') cnyDay += e.amount;
        else audDay += e.amount;
      });
      var totalDay = audDay + Math.round(cnyDay / rate);
      var totalLabel = formatAmount(totalDay, 'AUD');
      if (cnyDay > 0 && audDay > 0) {
        totalLabel += ' (A$' + (audDay/100).toFixed(2) + ' + ¥' + (cnyDay/100).toFixed(2) + ')';
      } else if (cnyDay > 0) {
        totalLabel += ' (¥' + (cnyDay/100).toFixed(2) + ')';
      }

      html += '<div class="txn-month-header">' + date + ' · 日支出 (Daily): ' + totalLabel + '</div>';

      items.forEach(function(e) {
        var cat = categoryById(e.category);
        var pm = paymentById(e.paymentMethod);
        var isIncome = e.category === 'income';
        var icon = cat ? cat.icon : '📌';
        var name = cat ? cat.zh + ' (' + cat.en + ')' : '未知 (Unknown)';
        var borderColor = cat ? cat.color : '#b0b0b0';
        var noteDisplay = e.note || (cat ? cat.zh : '');
        var pmDisplay = pm ? pm.zh : '';

        html += '<div class="txn-item" style="border-left-color:' + borderColor + ';" onclick="App.editExpense(\'' + e.id + '\')">';
        html += '<span class="txn-icon">' + icon + '</span>';
        html += '<div class="txn-info">';
        html += '<div class="txn-title">' + escHtml(noteDisplay) + '</div>';
        html += '<div class="txn-meta">' + (cat ? cat.zh + ' (' + cat.en + ')' : '') + ' · ' + pmDisplay + (e.isTaxDeductible ? ' · 🏷️' : '') + '</div>';
        html += '</div>';
        html += '<div class="txn-amount ' + (isIncome ? 'income' : 'expense') + '">' + (isIncome ? '+' : '-') + formatAmount(Math.abs(e.amount), e.currency || 'AUD') + '</div>';
        html += '</div>';
      });
    });

    listEl.innerHTML = html;
  });
}

function onTxnSearch(val) {
  txnFilter.search = val;
  loadTransactions();
}

function onTxnFilter(catId) {
  txnFilter.category = catId;
  var tags = document.querySelectorAll('#txn-filter-bar .tag');
  tags.forEach(function(t) {
    t.classList.remove('selected');
  });
  loadTransactions();
}

function txnPrevMonth() {
  var parts = txnFilter.month.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  if (m === 1) { y--; m = 12; } else { m--; }
  txnFilter.month = y + '-' + String(m).padStart(2,'0');
  renderTransactions();
}

function txnNextMonth() {
  var parts = txnFilter.month.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  if (m === 12) { y++; m = 1; } else { m++; }
  txnFilter.month = y + '-' + String(m).padStart(2,'0');
  renderTransactions();
}

function editExpense(id) {
  Promise.all([DB.getAllExpenses(), DB.getAttachments(id)]).then(function(results) {
    var all = results[0];
    var attachments = results[1];
    var record = all.find(function(e) { return e.id === id; });
    if (!record) return showToast('记录不存在 (Record not found)');

    var cat = categoryById(record.category);
    var pm = paymentById(record.paymentMethod);

    var content = '<div style="display:flex;flex-direction:column;gap:12px;">';
    content += '<div><strong>金额 (Amount):</strong> ' + formatAmount(Math.abs(record.amount), record.currency || 'AUD') + '</div>';
    content += '<div><strong>分类 (Category):</strong> ' + (cat ? cat.icon + ' ' + cat.zh + ' (' + cat.en + ')' : record.category) + '</div>';
    if (record.note) content += '<div><strong>备注 (Note):</strong> ' + escHtml(record.note) + '</div>';
    content += '<div><strong>日期 (Date):</strong> ' + record.date + '</div>';
    content += '<div><strong>支付方式 (Payment):</strong> ' + (pm ? pm.zh + ' (' + pm.en + ')' : record.paymentMethod) + '</div>';
    content += '<div><strong>退税 (Tax):</strong> ' + (record.isTaxDeductible ? '是 (Yes) 🏷️' : '否 (No)') + '</div>';

    // Show attachments
    if (attachments.length > 0) {
      content += '<div style="font-size:11px;color:var(--text-secondary);">📷 凭证 (Receipts) · ' + attachments.length + ' 张</div>';
      content += '<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">';
      attachments.forEach(function(att) {
        content += '<div style="position:relative;flex-shrink:0;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer;" onclick="App.viewAttachmentImage(\'' + att.id + '\')">';
        content += '<img src="' + URL.createObjectURL(att.blob) + '" style="width:100%;height:100%;object-fit:cover;">';
        content += '<span style="position:absolute;bottom:1px;right:3px;font-size:9px;color:#fff;background:rgba(0,0,0,0.5);padding:0 4px;border-radius:3px;">' + formatBytes(att.sizeBytes) + '</span>';
        content += '</div>';
      });
      content += '</div>';
    }

    // Add more photos button
    content += '<input type="file" id="attach-picker-' + id + '" accept="image/*" style="display:none;" onchange="App.attachToExpense(this, \'' + id + '\')">';
    content += '<button class="btn btn-small btn-secondary" onclick="document.getElementById(\'attach-picker-' + id + '\').click()">📷 添加凭证 (Add Receipt)</button>';

    content += '<div style="display:flex;gap:8px;margin-top:4px;">';
    content += '<button class="btn btn-small btn-secondary" onclick="App.deleteExpense(\'' + id + '\')">🗑️ 删除 (Delete)</button>';
    content += '</div>';
    content += '</div>';

    showModal('查看记录 (View Record)', content);
  });
}

function attachToExpense(input, expenseId) {
  var file = input.files[0];
  if (!file) return;
  compressImage(file).then(function(result) {
    return DB.addAttachment({
      id: uid(),
      expenseId: expenseId,
      fileName: file.name,
      blob: result.blob,
      width: result.width,
      height: result.height,
      sizeBytes: result.sizeBytes,
      createdAt: Date.now()
    });
  }).then(function() {
    showToast('✅ 凭证已添加 (Receipt Added)');
    // Refresh modal
    var modal = document.querySelector('.modal-overlay');
    if (modal) modal.remove();
    editExpense(expenseId);
  }).catch(function(err) {
    showToast('❌ 添加失败 (Failed): ' + err.message);
  });
  input.value = '';
}

function viewAttachmentImage(attId) {
  DB.getAllAttachments().then(function(all) {
    var att = all.find(function(a) { return a.id === attId; });
    if (!att) return;
    var url = URL.createObjectURL(att.blob);
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;align-items:center;justify-content:center;';
    overlay.onclick = function() { overlay.remove(); };
    var img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'max-width:95%;max-height:95%;object-fit:contain;border-radius:8px;';
    overlay.appendChild(img);
    // Delete button
    var delBtn = document.createElement('button');
    delBtn.textContent = '🗑️ 删除 (Delete)';
    delBtn.style.cssText = 'position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:#c44;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font);';
    delBtn.onclick = function(e) {
      e.stopPropagation();
      if (confirm('删除这张凭证？(Delete this receipt?)')) {
        DB.deleteAttachment(attId).then(function() {
          overlay.remove();
          showToast('🗑️ 凭证已删除 (Receipt Deleted)');
        });
      }
    };
    overlay.appendChild(delBtn);
    document.body.appendChild(overlay);
  });
}

function deleteExpense(id) {
  if (!confirm('确定删除这条记录及凭证照片？(Delete this record and receipts?)')) return;
  // Delete attachments first
  DB.getAttachments(id).then(function(atts) {
    return Promise.all(atts.map(function(a) { return DB.deleteAttachment(a.id); }));
  }).then(function() {
    return DB.deleteExpense(id);
  }).then(function() {
    document.querySelector('.modal-overlay').remove();
    showToast('🗑️ 已删除 (Deleted)');
    loadTransactions();
  });
}

/* ================================================================
   Vault Page
   ================================================================ */
var vaultState = { pin: '', mode: 'unlock', busy: false }; // unlock | setup | list | reverify

function renderVault() {
  if (!Crypto.isAvailable()) {
    Vault.lock();
    vaultState.pin = '';
    vaultState.busy = false;
    renderVaultUnavailable();
    return;
  }

  Vault.lock();
  vaultState.pin = '';
  vaultState.busy = false;
  vaultState.mode = Settings.hasPin() ? 'unlock' : 'setup';

  if (vaultState.mode === 'setup') {
    renderVaultSetup();
  } else {
    renderVaultUnlock();
  }
}

function renderVaultUnavailable() {
  document.getElementById('page-vault').innerHTML =
    '<div class="text-center" style="padding:28px 0 18px;">' +
    '<div style="font-size:40px;margin-bottom:12px;">🔐</div>' +
    '<div style="font-size:16px;font-weight:650;color:var(--text);margin-bottom:4px;">当前打开方式不安全</div>' +

    '</div>' +
    '<div class="vault-security-note danger">' +
    '<strong>为了保护银行卡密码、TFN 等敏感信息，保险库不会在当前地址下启用。</strong><br>' +
    escHtml(Crypto.unavailableReason()) + '<br>' +
    '你现在用手机访问局域网 HTTP 地址时，浏览器通常会禁用 Web Crypto，所以 PIN 会设置失败或反复要求重新设置。' +
    '</div>' +
    '<div class="vault-security-note">' +
    '安全使用方式：用 HTTPS 部署、用 localhost 开发测试，或后续打包成真正的手机 App。不要在普通 HTTP 页面里保存银行卡密码或税号。' +
    '</div>';
}

function renderVaultSetup() {

    '<div style="font-size:10px;color:var(--text-secondary);">Set Vault PIN (6 Digits)</div>' +

    '</div>' +
    '<div class="vault-security-note">加密仅在本机浏览器内完成；PIN 不会写进明文文件，保险库数据使用 AES-256-GCM 加密。</div>' +
    '<div class="pin-display" id="pin-display">' +
    '<div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>' +
    '<div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>' +
    '</div>' +
    '<div id="pin-msg" style="text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:12px;">输入 6 位 PIN (Enter 6-digit PIN)</div>' +
    '<div class="pin-pad">' + buildPinPad() + '</div>';

  vaultState.pin = '';

    '<div class="text-center mt-16"><button class="btn btn-small btn-secondary" onclick="App.resetVault()">🔄 重置保险库 (Reset Vault)</button></div>';

function buildPinPad() {
  var keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return keys.map(function(k) {
    if (k === '') return '<div></div>';
    if (k === '⌫') return '<div class="pin-key pin-del" onclick="App.pinKey(\'del\')">⌫</div>';
    return '<div class="pin-key" onclick="App.pinKey(\'' + k + '\')">' + k + '</div>';
  }).join('');
}

function pinKey(key) {
  if (vaultState.busy) return;
  if (key === 'del') {
    vaultState.pin = vaultState.pin.slice(0, -1);
  } else if (/^\d$/.test(key) && vaultState.pin.length < 6) {
    vaultState.pin += key;
  }

  // Update dots
  var dots = document.querySelectorAll('#pin-display .pin-dot');
  dots.forEach(function(d, i) {
    if (i < vaultState.pin.length) d.classList.add('filled');
    else d.classList.remove('filled');
  });

  if (vaultState.pin.length === 6) {
    handlePinComplete();
  }
}

var vaultSetupFirstPin = null;

function handlePinComplete() {
  if (vaultState.busy) return;
  var pin = vaultState.pin;

  if (vaultState.mode === 'setup') {
    // First entry — confirm
    if (!vaultSetupFirstPin) {
      vaultSetupFirstPin = pin;
      vaultState.pin = '';
      var dots = document.querySelectorAll('#pin-display .pin-dot');
      dots.forEach(function(d) { d.classList.remove('filled'); });
      document.getElementById('pin-msg').textContent = '再次输入确认 (Re-enter to Confirm)';
    } else {
      // Second entry — verify match
      if (pin !== vaultSetupFirstPin) {
        vaultState.pin = '';
        var dots2 = document.querySelectorAll('#pin-display .pin-dot');
        dots2.forEach(function(d) { d.classList.remove('filled'); });
        document.getElementById('pin-msg').textContent = '❌ PIN 不匹配，请重试 (Mismatch, Retry)';
        vaultSetupFirstPin = null;
        return;
      }
      // Show processing feedback
      vaultState.busy = true;
      document.getElementById('pin-msg').textContent = '⏳ 正在加密... (Encrypting...)';
      Settings.setPin(pin).then(function(key) {
        vaultSetupFirstPin = null;
        Vault.setUnlockedKey(key);
        showToast('✅ 保险库 PIN 已设置 (Vault PIN Set)');
        vaultState.mode = 'list';
        vaultState.busy = false;
        showVaultList();
      }).catch(function(err) {
        console.error('PIN setup error:', err);
        document.getElementById('pin-msg').textContent = '❌ 加密失败: ' + (err.message || '未知错误 (Unknown error)');
        vaultState.pin = '';
        vaultState.busy = false;
        vaultSetupFirstPin = null;
        var dots = document.querySelectorAll('#pin-display .pin-dot');
        dots.forEach(function(d) { d.classList.remove('filled'); });
      });
    }
  } else if (vaultState.mode === 'unlock') {
    vaultState.busy = true;
    document.getElementById('pin-msg').textContent = '⏳ 验证中... (Verifying...)';
    Vault.unlock(pin).then(function(ok) {
      if (ok) {
        vaultState.mode = 'list';
        vaultState.busy = false;
        showVaultList();
      } else {
        vaultState.pin = '';
        vaultState.busy = false;
        var dots3 = document.querySelectorAll('#pin-display .pin-dot');
        dots3.forEach(function(d) { d.classList.remove('filled'); });
        document.getElementById('pin-msg').textContent = '❌ PIN 错误 (Incorrect PIN)';
      }
    }).catch(function(err) {
      console.error('Unlock error:', err);
      document.getElementById('pin-msg').textContent = '❌ 验证失败 (Verification failed)';
      vaultState.pin = '';
      vaultState.busy = false;
      var dots4 = document.querySelectorAll('#pin-display .pin-dot');
      dots4.forEach(function(d) { d.classList.remove('filled'); });
    });
  } else if (vaultState.mode === 'reverify') {
    vaultState.busy = true;
    Vault.unlock(pin).then(function(ok) {
      if (ok) {
        vaultState.mode = 'list';
        vaultState.busy = false;
        // User was trying to view a specific item — show it
        if (vaultState._pendingViewId) {
          var vid = vaultState._pendingViewId;
          delete vaultState._pendingViewId;
          viewVaultItem(vid);
        } else {
          showVaultList();
        }
      } else {
        vaultState.pin = '';
        vaultState.busy = false;
        var dots4 = document.querySelectorAll('#pin-display .pin-dot');
        dots4.forEach(function(d) { d.classList.remove('filled'); });
        document.getElementById('pin-msg').textContent = '❌ PIN 错误 (Incorrect PIN)';
      }
    }).catch(function(err) {
      console.error('Reverify error:', err);
      vaultState.pin = '';
      vaultState.busy = false;
      var dots5 = document.querySelectorAll('#pin-display .pin-dot');
      dots5.forEach(function(d) { d.classList.remove('filled'); });
      document.getElementById('pin-msg').textContent = '❌ 验证失败 (Verification failed)';
    });
  }
}
